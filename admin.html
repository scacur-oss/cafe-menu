<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garson Paneli</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="admin-body">

    <div id="loginScreen" class="login-screen">
        <div class="login-box">
            <h2>Garson Girişi</h2>
            <p>Paneli görmek için şifre girin</p>

            <input type="password" id="adminPassword" placeholder="Şifre">
            <button id="loginBtn">Giriş Yap</button>

            <small id="loginError"></small>
        </div>
    </div>

    <header class="admin-header">
        <h1>Garson Paneli</h1>
        <p>Canlı Sipariş Takibi</p>
    </header>

    <main class="admin-container">



        <h2 class="section-title">Gelen İstekler</h2>
        <div id="requestsList"></div>

        <h2 class="section-title">Siparişler</h2>
        <div id="ordersList"></div>

    </main>

    <script type="module" src="admin.js"></script>
</body>

</html>
