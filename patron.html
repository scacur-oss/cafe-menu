<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patron Paneli</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="admin-body">

    <div id="patronLoginScreen" class="login-screen">
        <div class="login-box">
            <h2>Patron Girişi</h2>
            <p>Ciro ve ürün yönetimi için şifre girin</p>

            <input type="password" id="patronPassword" placeholder="Patron şifresi">
            <button id="patronLoginBtn">Giriş Yap</button>

            <small id="patronLoginError"></small>
        </div>
    </div>

    <header class="admin-header">
        <h1>Patron Paneli</h1>
        <p>Ciro ve Ürün Yönetimi</p>
    </header>

    <main class="admin-container">

        <div class="stats-grid">
            <div class="stat-card">
                <span>Bugünkü Ciro</span>
                <strong id="todayRevenue">0 TL</strong>
            </div>

            <div class="stat-card">
                <span>Toplam Sipariş</span>
                <strong id="totalOrders">0</strong>
            </div>

            <div class="stat-card">
                <span>Aktif Sipariş</span>
                <strong id="activeOrders">0</strong>
            </div>

            <div class="stat-card">
                <span>Tamamlanan</span>
                <strong id="completedOrders">0</strong>
            </div>
        </div>

        <h2 class="section-title">Ürün Ekle</h2>

        <div class="product-form">
            <input type="text" id="productName" placeholder="Ürün adı">

            <select id="productCategory">
                <option value="kahvalti">Kahvaltı</option>
                <option value="aperatif">Aperatifler</option>
                <option value="anayemek">Ana Yemekler</option>
                <option value="tatli">Tatlılar</option>
                <option value="sicak">Sıcak İçecekler</option>
                <option value="soguk">Soğuk İçecekler</option>
                <option value="kahve">Kahveler</option>
                <option value="smoothie">Smoothie</option>
                <option value="nargile">Nargile</option>
            </select>

            <input type="text" id="productDesc" placeholder="Kısa açıklama">
            <input type="number" id="productPrice" placeholder="Fiyat">
            <input type="file" id="productImageFile" accept="image/*">

            <button id="addProductBtn">Ürün Ekle</button>
        </div>
        <h2 class="section-title">Mevcut Ürünler</h2>
        <div id="productsManageList"></div>
    </main>

    <script type="module" src="patron.js"></script>
</body>

</html>
